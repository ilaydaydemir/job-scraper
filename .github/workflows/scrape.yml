name: Job Scraper

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  scrape-us-uk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Restore seen_ids cache
        uses: actions/cache@v4
        with:
          path: seen_ids.json
          key: seen-ids-${{ github.run_id }}
          restore-keys: seen-ids-
      - name: Run US+UK scraper
        env:
          ADZUNA_APP_ID:     ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:    ${{ secrets.ADZUNA_APP_KEY }}
          REED_API_KEY:      ${{ secrets.REED_API_KEY }}
          BACKEND_URL:       ${{ secrets.BACKEND_URL }}
        run: python scraper.py --once
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jobs-usuk-${{ github.run_number }}
          path: "jobs.csv\njobs.json"
          retention-days: 7

  scrape-eu:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Restore EU seen_ids cache
        uses: actions/cache@v4
        with:
          path: eu_seen_ids.json
          key: eu-seen-ids-${{ github.run_id }}
          restore-keys: eu-seen-ids-
      - name: Run EU scraper (DE + NL)
        env:
          ADZUNA_APP_ID:     ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:    ${{ secrets.ADZUNA_APP_KEY }}
          BACKEND_URL:       ${{ secrets.BACKEND_URL }}
        run: python scraper_eu.py --once
      - name: Upload EU artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eu-jobs-${{ github.run_number }}
          path: "eu_jobs.csv\neu_jobs.json"
          retention-days: 7
